name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.28.1)'
        required: true

permissions:
  contents: write

jobs:
  build-linux-x86:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --bin wshm --target x86_64-unknown-linux-gnu
      - name: Package tar.gz
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar czf wshm-x86_64-unknown-linux-gnu.tar.gz wshm
          mv wshm-x86_64-unknown-linux-gnu.tar.gz $GITHUB_WORKSPACE/
      - name: Package .deb (amd64)
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          mkdir -p deb/DEBIAN deb/usr/local/bin
          cp target/x86_64-unknown-linux-gnu/release/wshm deb/usr/local/bin/
          cat > deb/DEBIAN/control << EOF
          Package: wshm
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: wshm-dev <contact@wshm.dev>
          Description: AI-powered GitHub agent
           Triage issues, analyze PRs, manage merge queue.
          Homepage: https://wshm.dev
          EOF
          dpkg-deb --build deb wshm_${VERSION}_amd64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: wshm-x86_64-unknown-linux-gnu
          path: |
            wshm-x86_64-unknown-linux-gnu.tar.gz
            wshm_*_amd64.deb

  build-linux-arm:
    name: Build Linux aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --bin wshm --target aarch64-unknown-linux-gnu
      - name: Package tar.gz
        run: |
          cd target/aarch64-unknown-linux-gnu/release
          tar czf wshm-aarch64-unknown-linux-gnu.tar.gz wshm
          mv wshm-aarch64-unknown-linux-gnu.tar.gz $GITHUB_WORKSPACE/
      - name: Package .deb (arm64)
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          mkdir -p deb/DEBIAN deb/usr/local/bin
          cp target/aarch64-unknown-linux-gnu/release/wshm deb/usr/local/bin/
          cat > deb/DEBIAN/control << EOF
          Package: wshm
          Version: ${VERSION}
          Architecture: arm64
          Maintainer: wshm-dev <contact@wshm.dev>
          Description: AI-powered GitHub agent
           Triage issues, analyze PRs, manage merge queue.
          Homepage: https://wshm.dev
          EOF
          dpkg-deb --build deb wshm_${VERSION}_arm64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: wshm-aarch64-unknown-linux-gnu
          path: |
            wshm-aarch64-unknown-linux-gnu.tar.gz
            wshm_*_arm64.deb

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build
        run: cargo build --release --bin wshm --target x86_64-pc-windows-msvc
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path target/x86_64-pc-windows-msvc/release/wshm.exe -DestinationPath wshm-x86_64-pc-windows-msvc.zip
      - uses: actions/upload-artifact@v4
        with:
          name: wshm-x86_64-pc-windows-msvc
          path: wshm-x86_64-pc-windows-msvc.zip

  release:
    name: Create GitHub Release
    needs:
      - build-linux-x86
      - build-linux-arm
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute checksums
        run: sha256sum *.tar.gz *.zip *.deb > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          files: |
            wshm-*.tar.gz
            wshm-*.zip
            wshm_*.deb
            checksums.txt
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          SHA_X86=$(sha256sum wshm-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_ARM=$(sha256sum wshm-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/wshm-dev/homebrew-tap.git" tap

          cat > tap/Formula/wshm.rb << EOF
          class Wshm < Formula
            desc "AI-powered GitHub agent — triage, PR analysis, merge queue"
            homepage "https://wshm.dev"
            version "${VERSION}"
            license "SSPL-1.0"

            on_linux do
              on_intel do
                url "https://github.com/wshm-dev/wshm/releases/download/${TAG}/wshm-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86}"
              end
              on_arm do
                url "https://github.com/wshm-dev/wshm/releases/download/${TAG}/wshm-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_ARM}"
              end
            end

            def install
              bin.install "wshm"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/wshm --version")
            end
          end
          EOF

          cd tap
          git config user.email "release-bot@wshm.dev"
          git config user.name "wshm release bot"
          git add Formula/wshm.rb
          git commit -m "chore: update wshm formula to ${VERSION}"
          git push
