name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.28.1)'
        required: true

permissions:
  contents: write

jobs:
  build-linux-x86:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --bin wshm --target x86_64-unknown-linux-gnu
      - name: Package tar.gz
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar czf wshm-x86_64-unknown-linux-gnu.tar.gz wshm
          mv wshm-x86_64-unknown-linux-gnu.tar.gz $GITHUB_WORKSPACE/
      - name: Package .deb (amd64)
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          mkdir -p deb/DEBIAN deb/usr/local/bin
          cp target/x86_64-unknown-linux-gnu/release/wshm deb/usr/local/bin/
          cat > deb/DEBIAN/control << EOF
          Package: wshm
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: wshm-dev <contact@wshm.dev>
          Description: AI-powered GitHub agent
           Triage issues, analyze PRs, manage merge queue.
          Homepage: https://wshm.dev
          EOF
          dpkg-deb --build deb wshm_${VERSION}_amd64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: wshm-x86_64-unknown-linux-gnu
          path: |
            wshm-x86_64-unknown-linux-gnu.tar.gz
            wshm_*_amd64.deb

  build-linux-arm:
    name: Build Linux aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --bin wshm --target aarch64-unknown-linux-gnu
      - name: Package tar.gz
        run: |
          cd target/aarch64-unknown-linux-gnu/release
          tar czf wshm-aarch64-unknown-linux-gnu.tar.gz wshm
          mv wshm-aarch64-unknown-linux-gnu.tar.gz $GITHUB_WORKSPACE/
      - name: Package .deb (arm64)
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          mkdir -p deb/DEBIAN deb/usr/local/bin
          cp target/aarch64-unknown-linux-gnu/release/wshm deb/usr/local/bin/
          cat > deb/DEBIAN/control << EOF
          Package: wshm
          Version: ${VERSION}
          Architecture: arm64
          Maintainer: wshm-dev <contact@wshm.dev>
          Description: AI-powered GitHub agent
           Triage issues, analyze PRs, manage merge queue.
          Homepage: https://wshm.dev
          EOF
          dpkg-deb --build deb wshm_${VERSION}_arm64.deb
      - uses: actions/upload-artifact@v4
        with:
          name: wshm-aarch64-unknown-linux-gnu
          path: |
            wshm-aarch64-unknown-linux-gnu.tar.gz
            wshm_*_arm64.deb

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build
        run: cargo build --release --bin wshm --target x86_64-pc-windows-msvc
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path target/x86_64-pc-windows-msvc/release/wshm.exe -DestinationPath wshm-x86_64-pc-windows-msvc.zip
      - uses: actions/upload-artifact@v4
        with:
          name: wshm-x86_64-pc-windows-msvc
          path: wshm-x86_64-pc-windows-msvc.zip

  release:
    name: Create GitHub Release
    needs:
      - build-linux-x86
      - build-linux-arm
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute checksums
        run: sha256sum *.tar.gz *.zip *.deb > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          files: |
            wshm-*.tar.gz
            wshm-*.zip
            wshm_*.deb
            checksums.txt
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          SHA_X86=$(sha256sum wshm-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_ARM=$(sha256sum wshm-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          cat > wshm.rb << 'FORMULA'
          class Wshm < Formula
            desc "AI-powered GitHub agent — triage, PR analysis, merge queue"
            homepage "https://wshm.dev"
            version "VERSION_PLACEHOLDER"
            license "SSPL-1.0"

            on_linux do
              on_intel do
                url "https://github.com/wshm-dev/wshm/releases/download/TAG_PLACEHOLDER/wshm-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_X86_PLACEHOLDER"
              end
              on_arm do
                url "https://github.com/wshm-dev/wshm/releases/download/TAG_PLACEHOLDER/wshm-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "SHA_ARM_PLACEHOLDER"
              end
            end

            def install
              bin.install "wshm"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/wshm --version")
            end
          end
          FORMULA
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" wshm.rb
          sed -i "s/TAG_PLACEHOLDER/$TAG/g" wshm.rb
          sed -i "s/SHA_X86_PLACEHOLDER/$SHA_X86/g" wshm.rb
          sed -i "s/SHA_ARM_PLACEHOLDER/$SHA_ARM/g" wshm.rb
          sed -i 's/^          //' wshm.rb

          CONTENT=$(base64 -w 0 wshm.rb)
          SHA=$(gh api repos/wshm-dev/homebrew-tap/contents/Formula/wshm.rb --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            gh api -X PUT repos/wshm-dev/homebrew-tap/contents/Formula/wshm.rb \
              -f message="chore: update wshm formula to ${VERSION}" \
              -f content="$CONTENT" \
              -f sha="$SHA"
          else
            gh api -X PUT repos/wshm-dev/homebrew-tap/contents/Formula/wshm.rb \
              -f message="chore: update wshm formula to ${VERSION}" \
              -f content="$CONTENT"
          fi

  docker:
    name: Build and push Docker image
    needs: [build-linux-x86, build-linux-arm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          TAG="${{ github.ref_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            innovtech/wshm:${{ steps.version.outputs.version }}
            innovtech/wshm:latest
          labels: |
            org.opencontainers.image.source=https://github.com/wshm-dev/wshm
            org.opencontainers.image.description=wshm — AI-powered GitHub agent
            org.opencontainers.image.licenses=SSPL-1.0
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
